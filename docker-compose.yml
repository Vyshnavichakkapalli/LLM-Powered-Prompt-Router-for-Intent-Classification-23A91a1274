services:
  router:
    build: .
    container_name: prompt-router
    ports:
      - "8000:8000"
    env_file:
      - .env                        # loads GROQ_API_KEY, models, threshold
    volumes:
      - ./route_log.jsonl:/app/route_log.jsonl   # persist log on host
    restart: unless-stopped

  # Optional: run the batch test suite inside Docker
  # docker compose run --rm test
  test:
    build: .
    container_name: prompt-router-test
    command: python test_router.py
    env_file:
      - .env
    volumes:
      - ./route_log.jsonl:/app/route_log.jsonl
    profiles:
      - test                         # only runs when explicitly requested
